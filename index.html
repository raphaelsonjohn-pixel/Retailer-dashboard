<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BomaWave | FMCG Ordering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-content { display: none; }
        .step-active { display: flex; }
        .bg-boma-blue { background-color: #1e40af; }
        .bg-boma-green { background-color: #16a34a; }
        .text-boma-blue { color: #1e40af; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <div id="onboarding" class="fixed inset-0 z-50 flex items-center justify-center bg-white p-4">
        <div class="w-full max-w-xl bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
            
            <div id="step-1" class="step-content step-active flex-col items-center text-center">
                <h1 class="text-4xl font-black text-boma-blue italic mb-6">BomaWave</h1>
                <p class="text-slate-500 mb-8">Chagua Lugha / Select Language</p>
                <button onclick="BomaController.nextStep(1, 2, 'en')" class="w-full bg-boma-blue text-white py-4 rounded-2xl font-bold mb-4 shadow-lg">English</button>
                <button onclick="BomaController.nextStep(1, 2, 'sw')" class="w-full border-2 border-boma-blue text-boma-blue py-4 rounded-2xl font-bold">Kiswahili</button>
            </div>

            <div id="step-2" class="step-content flex-col">
                <h2 class="text-2xl font-bold mb-6 text-center">Wewe ni nani?</h2>
                <div class="space-y-4">
                    <button onclick="BomaController.selectRole('retailer')" class="w-full p-6 border-2 border-slate-100 rounded-2xl hover:border-green-600 text-left flex justify-between items-center group transition">
                        <div>
                            <span class="block font-bold text-lg">Retailer (Duka)</span>
                            <span class="text-sm text-slate-400">Naagiza bidhaa kwa duka langu</span>
                        </div>
                        <div class="w-6 h-6 border-2 rounded-full group-hover:bg-green-600"></div>
                    </button>
                    <button onclick="BomaController.selectRole('distributor')" class="w-full p-6 border-2 border-slate-100 rounded-2xl hover:border-blue-600 text-left flex justify-between items-center group transition">
                        <div>
                            <span class="block font-bold text-lg">Distributor (Muuzaji)</span>
                            <span class="text-sm text-slate-400">Nasambaza bidhaa kwa maduka</span>
                        </div>
                        <div class="w-6 h-6 border-2 rounded-full group-hover:bg-blue-600"></div>
                    </button>
                </div>
                <button onclick="BomaController.prevStep(2, 1)" class="mt-8 text-slate-400 font-bold">← Rudi Nyuma</button>
            </div>

            <div id="step-3" class="step-content flex-col">
                <h2 class="text-2xl font-bold mb-6 text-center">Tengeneza Akaunti</h2>
                <form id="reg-form" class="space-y-4">
                    <input type="text" id="reg-name" placeholder="Jina Kamili / Full Name" class="w-full border p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                    <input type="text" id="reg-user" placeholder="Username" class="w-full border p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                    <input type="text" id="reg-phone" placeholder="Namba ya Simu" class="w-full border p-4 rounded-xl" required>
                    <input type="text" id="reg-loc" placeholder="Eneo la Biashara (Location)" class="w-full border p-4 rounded-xl" required>
                    
                    <div id="coverage-field" class="hidden">
                        <input type="text" id="reg-coverage" placeholder="Maeneo unayosambaza (Coverage Area)" class="w-full border p-4 rounded-xl border-blue-200">
                    </div>

                    <input type="password" id="reg-pass" placeholder="Password" class="w-full border p-4 rounded-xl" required>
                    
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <button type="button" onclick="BomaController.prevStep(3, 2)" class="bg-slate-100 py-4 rounded-2xl font-bold">Back</button>
                        <button type="submit" class="bg-boma-blue text-white py-4 rounded-2xl font-bold shadow-lg">Kamilisha</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="app-main" class="hidden min-h-screen">
        <header class="bg-white border-b p-4 sticky top-0 z-40">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <span class="text-2xl font-black text-boma-blue italic tracking-tighter">BomaWave</span>
                <div id="user-badge" class="flex items-center gap-3">
                    <div class="text-right">
                        <p id="ui-username" class="font-bold text-sm"></p>
                        <p id="ui-role" class="text-[10px] font-black uppercase text-slate-400 tracking-widest"></p>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6">
            <div id="app-view"></div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
