<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supply Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#16a34a",
        primaryDark: "#15803d",
        secondary: "#2563eb",
        bg: "#f9fafb"
      }
    }
  }
}
</script>
</head>

<body class="bg-bg min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow p-6 space-y-6">

<!-- LANGUAGE -->
<section id="screen-language" class="space-y-4 text-center">
  <h1 class="text-xl font-semibold">Choose Language</h1>
  <button onclick="selectLanguage('en')" class="w-full bg-primary text-white py-3 rounded-xl">English</button>
  <button onclick="selectLanguage('sw')" class="w-full bg-primary text-white py-3 rounded-xl">Swahili</button>
</section>

<!-- ROLE -->
<section id="screen-role" class="hidden space-y-4 text-center">
  <h1 class="text-xl font-semibold">Select Role</h1>
  <button onclick="selectRole('retailer')" class="w-full bg-primary text-white py-3 rounded-xl">Retailer</button>
  <button onclick="selectRole('distributor')" class="w-full bg-primary text-white py-3 rounded-xl">Distributor</button>
</section>

<!-- SIGNUP -->
<section id="screen-signup" class="hidden space-y-3">
  <h2 class="text-lg font-semibold text-center">Create Account</h2>

  <input id="name" placeholder="Name" class="input"/>
  <input id="username" placeholder="Username" class="input"/>
  <input id="phone" placeholder="Phone" class="input"/>

  <div id="retailer-fields">
    <input id="store_name" placeholder="Store Name" class="input"/>
    <input id="location" placeholder="Location" class="input"/>
  </div>

  <div id="distributor-fields" class="hidden">
    <input id="business_name" placeholder="Business Name" class="input"/>
    <input id="business_type" placeholder="Business Type" class="input"/>
    <input id="operating_area" placeholder="Operating Area" class="input"/>
    <select id="delivery_available" class="input">
      <option value="true">Have delivery</option>
      <option value="false">No delivery</option>
    </select>
  </div>

  <input id="password" type="password" placeholder="Password" class="input"/>

  <button onclick="signup()" class="btn">Create Account</button>
  <p onclick="showLogin()" class="text-secondary text-center cursor-pointer">Login</p>
</section>

<!-- LOGIN -->
<section id="screen-login" class="hidden space-y-3">
  <h2 class="text-lg text-center font-semibold">Login</h2>
  <input id="login_phone" placeholder="Phone" class="input"/>
  <input id="login_password" type="password" placeholder="Password" class="input"/>
  <button onclick="login()" class="btn">Login</button>
</section>

<!-- DASHBOARD -->
<section id="screen-dashboard" class="hidden space-y-4">

  <h2 id="welcome" class="font-semibold text-lg"></h2>

  <!-- Distributor: Add product -->
  <div id="addProductSection" class="hidden space-y-2">
    <input id="product_name" placeholder="Product" class="input"/>
    <input id="price" placeholder="Price" class="input"/>
    <input id="moq" placeholder="MOQ" class="input"/>
    <button onclick="addProduct()" class="bg-secondary text-white w-full py-3 rounded-xl">Add Product</button>
  </div>

  <!-- Retailer: Products -->
  <div id="productList" class="space-y-2"></div>

  <!-- Distributor: Orders -->
  <div id="ordersList" class="space-y-2"></div>

  <button onclick="logout()" class="w-full bg-gray-200 py-3 rounded-xl">Logout</button>

</section>

</div>

<style>
.input {
  @apply w-full p-3 border rounded-xl;
}
.btn {
  @apply w-full bg-primary text-white py-3 rounded-xl;
}
</style>

<script type="module" src="app.js"></script>
</body>
</html>
