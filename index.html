<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BomaWave - FMCG Distribution Platform</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#10B981',
            secondary: '#3B82F6',
            danger: '#EF4444',
            warning: '#F59E0B',
            dark: '#1F2937',
            light: '#F3F4F6'
          },
          fontFamily: {
            'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif']
          }
        }
      }
    }
  </script>
  
  <!-- Custom Styles -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    * {
      font-family: 'Inter', sans-serif;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .animate-slide-in { animation: slideIn 0.3s ease; }
    .animate-fade-in { animation: fadeIn 0.3s ease; }
    .animate-spin { animation: spin 1s linear infinite; }
    
    .modal-overlay {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #F3F4F6;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #10B981;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #059669;
    }
  </style>
  
  <script type="module" src="supabase.js"></script>
  <script type="module" src="app.js"></script>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-blue-50 min-h-screen">

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-900 bg-opacity-50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-8 flex flex-col items-center shadow-2xl animate-fade-in">
      <div class="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p id="loadingMessage" class="text-gray-700 font-medium">Loading...</p>
    </div>
  </div>

  <!-- Language Selection Screen -->
  <div id="languageScreen" class="fixed inset-0 z-40 flex items-center justify-center bg-gradient-to-br from-green-600 to-blue-600">
    <div class="text-center p-8 animate-fade-in">
      <div class="mb-8">
        <div class="w-24 h-24 bg-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
          <span class="text-5xl">📦</span>
        </div>
        <h1 class="text-5xl font-bold text-white mb-2">BomaWave</h1>
        <p class="text-white text-opacity-90 text-lg">FMCG Distribution Platform</p>
      </div>
      
      <div class="space-y-4 mt-12">
        <button onclick="window.selectLanguage('en')" class="w-72 py-4 bg-white text-green-600 font-bold rounded-xl hover:shadow-2xl transition-all duration-300 text-lg transform hover:scale-105">
          🇬🇧 English
        </button>
        <button onclick="window.selectLanguage('sw')" class="w-72 py-4 bg-white text-blue-600 font-bold rounded-xl hover:shadow-2xl transition-all duration-300 text-lg transform hover:scale-105">
          🇹🇿 Kiswahili
        </button>
      </div>
    </div>
  </div>

  <!-- Login Section -->
  <div id="loginSection" class="hidden min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 animate-fade-in">
      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-gradient-to-br from-green-500 to-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
          <span class="text-3xl text-white">📦</span>
        </div>
        <h1 id="loginTitle" class="text-3xl font-bold text-gray-800">BomaWave</h1>
        <p id="loginSubtitle" class="text-gray-500 mt-2">Sign in to continue</p>
      </div>
      
      <div class="space-y-6">
        <!-- Google Login Button -->
        <button id="googleSignInBtn" class="w-full py-3 bg-white border-2 border-gray-200 text-gray-700 font-semibold rounded-xl hover:bg-gray-50 hover:border-gray-300 transition-all duration-300 flex items-center justify-center gap-3">
          <svg class="w-6 h-6" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span id="googleBtnText">Continue with Google</span>
        </button>
        
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-500">Or continue with</span>
          </div>
        </div>
        
        <!-- Email/Password Form (Fallback) -->
        <div class="space-y-4">
          <div>
            <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all" placeholder="Email address" />
          </div>
          <div>
            <input type="text" id="name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all" placeholder="Full name" />
          </div>
          <div>
            <input type="tel" id="phone" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all" placeholder="Phone (optional)" />
          </div>
          <div>
            <input type="text" id="location" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all" placeholder="Location" />
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">I am a:</label>
            <div class="flex gap-3">
              <button type="button" id="roleRetailer" class="flex-1 py-3 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition-all duration-300">Retailer</button>
              <button type="button" id="roleDistributor" class="flex-1 py-3 bg-gray-200 text-gray-700 font-semibold rounded-xl hover:bg-gray-300 transition-all duration-300">Distributor</button>
            </div>
          </div>
          
          <button id="magicLinkBtn" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-all duration-300 shadow-md">
            Send Magic Link
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Distributor Dashboard -->
  <div id="distributorDashboard" class="hidden min-h-screen bg-gray-50">
    <!-- Header -->
    <div class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-20">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-blue-500 rounded-xl flex items-center justify-center">
            <span class="text-white text-xl">📦</span>
          </div>
          <h2 class="text-xl font-bold text-gray-800">Distributor Portal</h2>
        </div>
        <div class="flex gap-3">
          <div class="flex items-center gap-2 px-3 py-2 bg-gray-100 rounded-lg">
            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            <span class="text-sm text-gray-600" id="distributorEmail"></span>
          </div>
          <button id="logoutBtn" class="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-all duration-300 font-medium">Logout</button>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="border-b border-gray-200 bg-white sticky top-[73px] z-10 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex gap-2">
          <button class="tab-distributor px-6 py-3 text-gray-600 hover:text-green-600 border-b-2 border-transparent transition-all duration-300 font-medium" data-tab="productsTab">Products</button>
          <button class="tab-distributor px-6 py-3 text-gray-600 hover:text-green-600 border-b-2 border-transparent transition-all duration-300 font-medium" data-tab="ordersTab">Orders</button>
          <button class="tab-distributor px-6 py-3 text-gray-600 hover:text-green-600 border-b-2 border-transparent transition-all duration-300 font-medium" data-tab="alertsTab">Stock Alerts</button>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <!-- Products Tab -->
      <div id="productsTab" class="tab-content-distributor">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8">
          <h3 class="text-xl font-bold text-gray-800 mb-4">➕ Add New Product</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <input type="text" id="productName" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Product Name" />
            <input type="text" id="productNameSw" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Jina la Bidhaa (Swahili)" />
            <input type="number" id="productPrice" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Price (TZS)" />
            <input type="number" id="productStock" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Stock Quantity" />
            <input type="number" id="minOrderQty" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Min Order Quantity" value="1" />
            <input type="text" id="productCategory" class="px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Category (Beverages, Food, etc.)" />
          </div>
          <button id="addProductBtn" class="mt-6 px-6 py-2 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition-all duration-300 shadow-md">Add Product</button>
        </div>
        
        <div id="distributorProducts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>

      <!-- Orders Tab -->
      <div id="ordersTab" class="tab-content-distributor hidden">
        <div id="distributorOrders" class="space-y-4"></div>
      </div>

      <!-- Alerts Tab -->
      <div id="alertsTab" class="tab-content-distributor hidden">
        <div id="stockAlerts" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <!-- Retailer Dashboard -->
  <div id="retailerDashboard" class="hidden min-h-screen bg-gray-50">
    <div class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-20">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-blue-500 rounded-xl flex items-center justify-center">
            <span class="text-white text-xl">🏪</span>
          </div>
          <h2 class="text-xl font-bold text-gray-800">Retailer Portal</h2>
        </div>
        <div class="flex gap-3">
          <div class="flex items-center gap-2 px-3 py-2 bg-gray-100 rounded-lg">
            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            <span class="text-sm text-gray-600" id="retailerEmail"></span>
          </div>
          <button id="showCartBtn" class="relative px-4 py-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all duration-300 font-medium">
            🛒 Cart
            <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 min-w-[20px]">0</span>
          </button>
          <button id="logoutBtn2" class="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-all duration-300 font-medium">Logout</button>
        </div>
      </div>
    </div>

    <div class="border-b border-gray-200 bg-white sticky top-[73px] z-10 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex gap-2">
          <button class="tab-retailer px-6 py-3 text-gray-600 hover:text-green-600 border-b-2 border-transparent transition-all duration-300 font-medium" data-tab="browseTab">Products</button>
          <button class="tab-retailer px-6 py-3 text-gray-600 hover:text-green-600 border-b-2 border-transparent transition-all duration-300 font-medium" data-tab="retailerOrdersTab">My Orders</button>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div id="browseTab" class="tab-content-retailer">
        <div class="flex flex-col md:flex-row gap-4 mb-8">
          <input type="text" id="searchProducts" class="flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="🔍 Search products..." />
          <select id="categoryFilter" class="px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500">
            <option value="all">All Categories</option>
          </select>
        </div>
        <div id="retailerProducts" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>

      <div id="retailerOrdersTab" class="tab-content-retailer hidden">
        <div id="retailerOrders" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="adminDashboard" class="hidden min-h-screen bg-gray-50">
    <div class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-20">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-blue-500 rounded-xl flex items-center justify-center">
            <span class="text-white text-xl">👑</span>
          </div>
          <h2 class="text-xl font-bold text-gray-800">Admin Portal</h2>
        </div>
        <div class="flex gap-3">
          <div class="flex items-center gap-2 px-3 py-2 bg-gray-100 rounded-lg">
            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            <span class="text-sm text-gray-600" id="adminEmail"></span>
          </div>
          <button id="adminLogoutBtn" class="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-all duration-300 font-medium">Logout</button>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="bg-white rounded-2xl shadow-sm p-6 mb-8">
        <h3 class="text-xl font-bold text-gray-800 mb-4">⏳ Pending Distributor Approvals</h3>
        <div id="pendingDistributors" class="space-y-3"></div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4">📊 All Orders (Platform Wide)</h3>
        <div id="adminOrders" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cartModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="absolute inset-0 modal-overlay" onclick="closeModal('cartModal')"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full max-h-[85vh] overflow-auto animate-fade-in">
      <div class="sticky top-0 bg-white border-b border-gray-200 p-4 flex justify-between items-center">
        <h3 class="text-xl font-bold text-gray-800">🛒 Your Cart</h3>
        <button onclick="closeModal('cartModal')" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
      </div>
      <div id="cartItems" class="p-4 space-y-3"></div>
      <div class="border-t border-gray-200 p-4 space-y-4">
        <p class="flex justify-between text-lg font-bold"><span>Total:</span> <span id="cartTotal" class="text-green-600">0</span> <span class="text-sm font-normal">TZS</span></p>
        <p id="minOrderWarning" class="text-sm text-yellow-600"></p>
        <textarea id="deliveryAddress" class="w-full px-3 py-2 border border-gray-300 rounded-xl" rows="2" placeholder="Delivery Address"></textarea>
        <select id="paymentMethod" class="w-full px-3 py-2 border border-gray-300 rounded-xl">
          <option value="cash">💵 Cash</option>
          <option value="card">💳 Card</option>
          <option value="mobile_money">📱 Mobile Money</option>
        </select>
        <button id="checkoutBtn" class="w-full py-3 bg-green-600 text-white font-semibold rounded-xl hover:bg-green-700 transition-all duration-300 shadow-md">✅ Place Order</button>
      </div>
    </div>
  </div>

  <!-- Order Status Modal -->
  <div id="orderStatusModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="absolute inset-0 modal-overlay" onclick="closeModal('orderStatusModal')"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full animate-fade-in">
      <div class="border-b border-gray-200 p-4 flex justify-between items-center">
        <h3 class="text-xl font-bold text-gray-800">📦 Order Status</h3>
        <button onclick="closeModal('orderStatusModal')" class="text-gray-400 hover:text-gray-600 text-3xl">&times;</button>
      </div>
      <div id="orderStatusContent" class="p-4"></div>
    </div>
  </div>

</body>
</html>
